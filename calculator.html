<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RubleRover | Калькулятор</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Кнопка установки приложения -->
<button id="installButton" style="display:none; position:fixed; bottom:20px; right:20px; padding:14px 28px; background:#4a2c8a; color:white; border:none; border-radius:50px; font-size:16px; font-weight:bold; cursor:pointer; box-shadow:0 4px 15px rgba(74,44,138,0.4); z-index:999;">
    📱 Установить приложение
</button>
    <header>
        <div class="header-content">
            <div class="logo">✈️ RubleRover</div>
            <nav>
                <a href="index.html">Главная</a>
                <a href="calculator.html" class="active">Калькулятор</a>
                <a href="history.html">История</a>
                <a href="about.html">О проекте</a>
                <a href="contacts.html">Контакты</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <h1>Калькулятор бюджета</h1>
        <p>Введи расходы и узнай общую сумму</p>

        <form id="budgetForm">
            <div class="form-group">
                <label>Город / Страна</label>
                <input type="text" id="city" placeholder="Например: Париж" required>
            </div>
            <div class="form-group">
                <label>Жильё (₽)</label>
                <input type="number" id="housing" placeholder="0" min="0" required>
            </div>
            <div class="form-group">
                <label>Еда (₽)</label>
                <input type="number" id="food" placeholder="0" min="0" required>
            </div>
            <div class="form-group">
                <label>Транспорт (₽)</label>
                <input type="number" id="transport" placeholder="0" min="0" required>
            </div>
            <div class="form-group">
                <label>Билеты (₽)</label>
                <input type="number" id="tickets" placeholder="0" min="0" required>
            </div>
            <button type="submit" class="btn">Рассчитать</button>
        </form>

        <div id="result" style="display:none;">
            <h3>Результат</h3>
            <p id="resultCity"></p>
            <div class="result-item"><span>Жильё</span> <span id="resultHousing">0 ₽</span></div>
            <div class="result-item"><span>Еда</span> <span id="resultFood">0 ₽</span></div>
            <div class="result-item"><span>Транспорт</span> <span id="resultTransport">0 ₽</span></div>
            <div class="result-item"><span>Билеты</span> <span id="resultTickets">0 ₽</span></div>
            <div class="result-item total"><span>ИТОГО</span> <span id="resultTotal">0 ₽</span></div>
        </div>
    </div>

    <footer>
        <p> RubleRover</p>
    </footer>

    <script>
        document.getElementById('budgetForm').onsubmit = function(e) {
            e.preventDefault();
            
            let city = document.getElementById('city').value;
            let housing = Number(document.getElementById('housing').value) || 0;
            let food = Number(document.getElementById('food').value) || 0;
            let transport = Number(document.getElementById('transport').value) || 0;
            let tickets = Number(document.getElementById('tickets').value) || 0;
            let total = housing + food + transport + tickets;

            document.getElementById('resultCity').textContent = '✈️ ' + city;
            document.getElementById('resultHousing').textContent = housing + ' ₽';
            document.getElementById('resultFood').textContent = food + ' ₽';
            document.getElementById('resultTransport').textContent = transport + ' ₽';
            document.getElementById('resultTickets').textContent = tickets + ' ₽';
            document.getElementById('resultTotal').textContent = total + ' ₽';
            document.getElementById('result').style.display = 'block';
        };
    </script>
<script>
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
        // Предотвращаем автоматический запрос
        e.preventDefault();
        deferredPrompt = e;
        
        // Показываем кнопку
        const installBtn = document.getElementById('installButton');
        installBtn.style.display = 'block';
        
        // Обработчик клика по кнопке
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const result = await deferredPrompt.userChoice;
                console.log('Результат:', result.outcome);
                deferredPrompt = null;
                installBtn.style.display = 'none';
            }
        });
    });

    // Если приложение уже установлено — скрываем кнопку
    window.addEventListener('appinstalled', () => {
        document.getElementById('installButton').style.display = 'none';
    });
</script>
</body>
</html>
