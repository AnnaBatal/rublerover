<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RubleRover | Контакты</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- Кнопка установки приложения -->
<button id="installButton" style="display:none; position:fixed; bottom:20px; right:20px; padding:14px 28px; background:#4a2c8a; color:white; border:none; border-radius:50px; font-size:16px; font-weight:bold; cursor:pointer; box-shadow:0 4px 15px rgba(74,44,138,0.4); z-index:999;">
    📱 Установить приложение
</button>
    <header>
        <div class="header-content">
            <div class="logo">✈️ RubleRover</div>
            <nav>
                <a href="index.html">Главная</a>
                <a href="calculator.html">Калькулятор</a>
                <a href="history.html">История</a>
                <a href="about.html">О проекте</a>
                <a href="contacts.html" class="active">Контакты</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <h1>Связь с нами</h1>
        <p>Есть вопросы? Напиши!</p>

        <form id="contactForm">
            <div class="form-group">
                <label>Имя</label>
                <input type="text" id="name" placeholder="Иван" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="ivan@mail.ru" required>
            </div>
            <div class="form-group">
                <label>Сообщение</label>
                <textarea id="message" rows="4" placeholder="Ваше сообщение..." required></textarea>
            </div>
            <button type="submit" class="btn">Отправить</button>
        </form>

        <div id="contactResult" style="display:none;">
            <p>✅ Спасибо! Сообщение отправлено.</p>
        </div>

        <hr>
        <h3>Контакты</h3>
        <p>Email: info@rublerover.ru</p>
        <p>Телефон: +7 (999) 67-67-67</p>
        <p>Адрес: Москва</p>
    </div>

    <footer>
        <p> RubleRover</p>
    </footer>

    <script>
        document.getElementById('contactForm').onsubmit = function(e) {
            e.preventDefault();
            document.getElementById('contactResult').style.display = 'block';
            this.reset();
            setTimeout(function() {
                document.getElementById('contactResult').style.display = 'none';
            }, 3000);
        };
    </script>

    <script>
        let deferredPrompt;

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            const installBtn = document.getElementById('installButton');
            installBtn.style.display = 'block';
        });

        document.getElementById('installButton').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const result = await deferredPrompt.userChoice;
                console.log('Результат:', result.outcome);
                deferredPrompt = null;
                document.getElementById('installButton').style.display = 'none';
            }
        });

        window.addEventListener('appinstalled', () => {
            document.getElementById('installButton').style.display = 'none';
        });
    </script>

    <!-- ===== СКРИПТ РЕГИСТРАЦИИ SERVICE WORKER ===== -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/rublerover/sw.js')
                .then(registration => {
                    console.log('✅ Service Worker зарегистрирован');
                })
                .catch(error => {
                    console.error('❌ Ошибка регистрации Service Worker:', error);
                });
        }
    </script>
</body>
</html>
