<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RubleRover | История</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-content">
            <div class="logo">
                <h1>✈️ RubleRover</h1>
            </div>
            <nav>
                <a href="index.html">Главная</a>
                <a href="calculator.html">Калькулятор</a>
                <a href="history.html" class="active">История</a>
                <a href="about.html">О проекте</a>
                <a href="contacts.html">Контакты</a>
            </nav>
        </div>
    </header>

    <div class="container">
        <h1>📊 История поездок</h1>
        <p class="subtitle">Все твои сохранённые расчёты</p>

        <div id="historyContainer"></div>

        <div style="text-align: center; margin-top: 20px;">
            <a href="calculator.html" class="btn-secondary">➕ Добавить новую поездку</a>
            <button onclick="clearHistory()" class="btn-secondary" style="background: #ef4444; margin-left: 10px;">🗑️ Очистить историю</button>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            <p>✈️ RubleRover — Тревел-калькулятор бюджета</p>
            <p>© 2026</p>
        </div>
    </footer>

    <script>
        function loadHistory() {
            const container = document.getElementById('historyContainer');
            const trips = JSON.parse(localStorage.getItem('trips')) || [];

            if (trips.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #6b7280;">
                        <p style="font-size: 24px;">📭</p>
                        <p>Пока нет сохранённых поездок.</p>
                        <p style="margin-top: 10px;">Перейди в <a href="calculator.html" style="color: #7c3aed;">калькулятор</a>, чтобы добавить первую!</p>
                    </div>
                `;
                return;
            }

            let html = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>Город</th>
                            <th>Жильё</th>
                            <th>Еда</th>
                            <th>Транспорт</th>
                            <th>Билеты</th>
                            <th>Итого</th>
                            <th>Дата</th>
                            <th>Действие</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            // Показываем в обратном порядке (сначала новые)
            trips.slice().reverse().forEach((trip, index) => {
                const realIndex = trips.length - 1 - index;
                html += `
                    <tr>
                        <td><strong>${trip.city}</strong></td>
                        <td>${formatNumber(trip.housing)} ₽</td>
                        <td>${formatNumber(trip.food)} ₽</td>
                        <td>${formatNumber(trip.transport)} ₽</td>
                        <td>${formatNumber(trip.tickets)} ₽</td>
                        <td><strong>${formatNumber(trip.total)} ₽</strong></td>
                        <td>${trip.date}</td>
                        <td><button onclick="deleteTrip(${realIndex})" style="background: #ef4444; color: white; border: none; border-radius: 5px; padding: 5px 10px; cursor: pointer;">❌</button></td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>
                <div style="margin-top: 10px; text-align: right; color: #6b7280;">
                    Всего: ${trips.length} поездок
                </div>
            `;

            container.innerHTML = html;
        }

        function formatNumber(num) {
            return num.toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g, " ");
        }

        function deleteTrip(index) {
            let trips = JSON.parse(localStorage.getItem('trips')) || [];
            trips.splice(index, 1);
            localStorage.setItem('trips', JSON.stringify(trips));
            loadHistory(); // Перезагружаем таблицу
        }

        function clearHistory() {
            if (confirm('Точно удалить все поездки?')) {
                localStorage.removeItem('trips');
                loadHistory();
            }
        }

        // Загружаем историю при открытии страницы
        window.onload = loadHistory;
    </script>

</body>
</html>
